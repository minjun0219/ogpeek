name: Publish ogpeek to npm (manual)

# 평소 릴리스는 release-please.yml 이 처리한다. 이 워크플로우는
# packages/ogpeek/package.json 의 현재 버전을 그대로 publish 하는
# 비상용 수동 트리거다 (예: release-please 가 막혔거나 dist-tag 를
# 따로 붙이고 싶을 때).
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "npm dist-tag (기본값: latest)"
        required: false
        default: latest
      dry-run:
        description: "실제 publish 없이 리허설만 수행"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish packages/ogpeek
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -F ogpeek typecheck

      - name: Test
        run: pnpm -F ogpeek test

      - name: Build
        run: pnpm -F ogpeek build

      - name: Publish to npm
        working-directory: packages/ogpeek
        env:
          # secrets.NPM_AUTH_TOKEN 이 비어있으면 npm CLI 가 OIDC(Trusted
          # Publisher) 로 폴백한다. 첫 발행 후 패키지 settings 에서 Trusted
          # Publisher 를 등록하고 NPM_AUTH_TOKEN 시크릿만 비우면 토큰 없이
          # 굴러간다.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
          DIST_TAG: ${{ github.event.inputs.tag || 'latest' }}
          DRY_RUN: ${{ github.event.inputs.dry-run || 'false' }}
        run: |
          args=(--access public --provenance --no-git-checks --tag "$DIST_TAG")
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          pnpm publish "${args[@]}"
