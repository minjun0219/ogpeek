name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Open release PR / cut release
    runs-on: ubuntu-latest
    outputs:
      ogpeek_release_created: ${{ steps.release.outputs['packages/ogpeek--release_created'] }}
      ogpeek_tag_name: ${{ steps.release.outputs['packages/ogpeek--tag_name'] }}
      react_release_created: ${{ steps.release.outputs['packages/ogpeek-react--release_created'] }}
      react_tag_name: ${{ steps.release.outputs['packages/ogpeek-react--tag_name'] }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish-ogpeek:
    name: Publish ogpeek to npm
    needs: release-please
    if: needs.release-please.outputs.ogpeek_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.ogpeek_tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -F ogpeek typecheck

      - name: Test
        run: pnpm -F ogpeek test

      - name: Build
        run: pnpm -F ogpeek build

      - name: Publish to npm
        working-directory: packages/ogpeek
        env:
          # secrets.NPM_AUTH_TOKEN 이 비어있으면 npm CLI 가 OIDC(Trusted
          # Publisher) 로 폴백한다.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks

  publish-ogpeek-react:
    name: Publish @ogpeek/react to npm
    needs: release-please
    if: needs.release-please.outputs.react_release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.react_tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # @ogpeek/react 는 ogpeek/dist 의 타입을 참조하므로 먼저 빌드해 둔다.
      - name: Build ogpeek
        run: pnpm -F ogpeek build

      - name: Typecheck
        run: pnpm -F @ogpeek/react typecheck

      - name: Test
        run: pnpm -F @ogpeek/react test

      - name: Build
        run: pnpm -F @ogpeek/react build

      - name: Publish to npm
        working-directory: packages/ogpeek-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTH_TOKEN }}
        run: pnpm publish --access public --provenance --no-git-checks
