name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  lint:
    name: biome (format + lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check
        run: pnpm exec biome ci

  build-test:
    name: typecheck + test + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the two libraries once, in topo order. Downstream steps below
      # consume dist/ and skip rebuilding (we bypass the website typecheck
      # script's own libs:build chain to avoid the second compile).
      - name: Build libraries
        run: pnpm libs:build

      - name: Typecheck ogpeek
        run: pnpm -F ogpeek typecheck

      - name: Typecheck @ogpeek/react
        run: pnpm -F @ogpeek/react typecheck

      - name: Typecheck website
        working-directory: website
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm -r --filter './packages/*' test
